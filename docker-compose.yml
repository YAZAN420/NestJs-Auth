version: '3'
services:
  db:
    image: mongo
    restart: always
    command: ['--replSet', 'rs0']
    ports:
      - 27017:27017

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    depends_on:
      - db
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://db:27017/?directConnection=true
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=root
  redis:
    image: redis
    ports:
      - '6379:6379'
    restart: always

# docker compose exec db mongosh --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]})"
